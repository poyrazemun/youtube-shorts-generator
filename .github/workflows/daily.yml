name: Daily YouTube Shorts

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC every day
  workflow_dispatch:        # also triggerable manually from the Actions tab

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit topics_queue.json back

    env:
      ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
      HUGGINGFACE_API_TOKEN:   ${{ secrets.HUGGINGFACE_API_TOKEN }}
      YOUTUBE_PRIVACY:         private
      LOG_LEVEL:               INFO

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── System deps ─────────────────────────────────────────────────────────
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── Python deps ─────────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Secrets → files ─────────────────────────────────────────────────────
      - name: Write YouTube credentials from secrets
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRETS_B64 }}" | base64 -d > client_secrets.json
          echo "${{ secrets.YOUTUBE_CREDENTIALS_B64 }}"    | base64 -d > credentials.json

      # ── Topic queue guard ────────────────────────────────────────────────────
      # Refresh queue on Mondays OR if no pending topics remain
      - name: Refresh topic queue if needed
        run: |
          NEEDS_REFRESH=false

          # Check if today is Monday (weekday 1)
          if [ "$(date +%u)" = "1" ]; then
            echo "Monday — refreshing topic queue."
            NEEDS_REFRESH=true
          fi

          # Check if topics_queue.json has any pending entries
          if [ "$NEEDS_REFRESH" = "false" ]; then
            PENDING=$(python -c "
          import json, sys
          try:
              q = json.load(open('topics_queue.json'))
              print(sum(1 for t in q.get('topics', []) if t['status'] == 'pending'))
          except Exception:
              print(0)
          ")
            if [ "$PENDING" = "0" ]; then
              echo "No pending topics — refreshing queue."
              NEEDS_REFRESH=true
            else
              echo "$PENDING pending topic(s) in queue."
            fi
          fi

          if [ "$NEEDS_REFRESH" = "true" ]; then
            python orchestrator.py --refresh-topics
          fi

      # ── Run pipeline ─────────────────────────────────────────────────────────
      - name: Run pipeline (--auto)
        run: python orchestrator.py --auto

      # ── Persist queue state ──────────────────────────────────────────────────
      - name: Commit updated topics_queue.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics_queue.json
          git diff --cached --quiet || git commit -m "chore: update topic queue [skip ci]"
          git push

      # ── Upload videos as artifacts ───────────────────────────────────────────
      - name: Upload generated videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_number }}
          path: output/**/*.mp4
          retention-days: 7
          if-no-files-found: warn

      # ── Clean up credential files ────────────────────────────────────────────
      - name: Remove credential files from runner
        if: always()
        run: rm -f client_secrets.json credentials.json

      # ── Upload logs on failure ───────────────────────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 3
